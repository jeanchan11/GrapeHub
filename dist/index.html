
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrapeHub</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=5">
    <link rel="shortcut icon" href="/favicon.ico?v=5">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tema Escuro (Padrão) */
            --dark-bg: 10 1 24; /* #0a0118 */
            --dark-card: 20 8 46; /* #14082e */
            --dark-sidebar: 5 0 12; /* #05000c */
            --dark-text: 255 255 255; /* #ffffff */
            --dark-card-hover: 28 14 58; /* #1c0e3a */
            --dark-input: 20 8 46; /* #14082e */
            --dark-tooltip: 10 1 24; /* #0a0118 */
            --accent-color: 124 58 237; /* #7c3aed */
            --accent-color-dark: 109 40 217; /* #6d28d9 */
        }
        
        /* Tema Escuro Profundo */
        html.darker {
            --dark-bg: 13 11 20; /* #0D0B14 */
            --dark-card: 26 23 38; /* #1A1726 */
            --dark-sidebar: 17 14 26; /* #110E1A */
            --dark-text: 232 230 242; /* #E8E6F2 */
            --dark-card-hover: 33 30 48; /* #211E30 */
            --dark-input: 21 18 31; /* #15121F */
            --dark-tooltip: 13 11 20; /* #0D0B14 */
            --accent-color: 124 58 237; /* #7c3aed */
            --accent-color-dark: 109 40 217; /* #6d28d9 */
        }

        /* Tema Claro (Branco) */
        html.light {
            --dark-bg: 255 255 255; /* #ffffff */
            --dark-card: 248 250 252; /* #f8fafc */
            --dark-sidebar: 241 245 249; /* #f1f5f9 */
            --dark-text: 30 41 59; /* #1e293b */
            --dark-card-hover: 241 245 249; /* #f1f5f9 */
            --dark-input: 248 250 252; /* #f8fafc */
            --dark-tooltip: 255 255 255; /* #ffffff */
            --accent-color: 124 58 237; /* #7c3aed */
            --accent-color-dark: 109 40 217; /* #6d28d9 */
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            plugins: [
                function({ addVariant }) {
                    addVariant('darker', '.darker &');
                }
            ],
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: 'rgb(var(--dark-bg) / <alpha-value>)',
                            card: 'rgb(var(--dark-card) / <alpha-value>)',
                            sidebar: 'rgb(var(--dark-sidebar) / <alpha-value>)',
                            text: 'rgb(var(--dark-text) / <alpha-value>)',
                            'card-hover': 'rgb(var(--dark-card-hover) / <alpha-value>)',
                            input: 'rgb(var(--dark-input) / <alpha-value>)',
                            tooltip: 'rgb(var(--dark-tooltip) / <alpha-value>)',
                        },
                        violet: {
                            500: 'rgb(var(--accent-color) / <alpha-value>)',
                            600: 'rgb(var(--accent-color-dark) / <alpha-value>)',
                        },
                        light: {
                            text: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s, color 0.3s;
        }
        
        html.dark body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        /* Global Card Styling for Dark Mode */
        html.dark .dark\:bg-dark-card, html.dark .dark\:bg-dark-input, html.dark .dark\:bg-dark-sidebar {
            border-color: rgba(255, 255, 255, 0.05) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            position: relative;
        }

        /* Modals - Glassmorphism */
        /* Claro (padrão) */
        .modal-overlay {
            background: rgba(15, 23, 42, 0.35);
        }
        .modal-container {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.07);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.10);
            border-radius: 22px;
        }
        .modal-input {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            color: #111827;
        }
        .modal-input::placeholder {
            color: #9CA3AF;
        }
        .modal-divider {
            border-color: #F3F4F6;
        }
        .modal-title {
            color: #111827;
        }
        .modal-tab-active {
            color: #7C3AED;
        }
        .modal-btn-cancel {
            background: #FFFFFF;
            border: 1.5px solid #E5E7EB;
            color: #4B5563;
        }

        /* Escuro (roxo) */
        html.dark .modal-overlay {
            background: rgba(0, 0, 0, 0.60);
        }
        html.dark .modal-container {
            background: #1E1B2E;
            border: 1px solid rgba(167, 139, 250, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.50);
            border-radius: 22px;
        }
        html.dark .modal-input {
            background: #2D2845;
            border: 1px solid rgba(167, 139, 250, 0.18);
            color: #EDE9FE;
        }
        html.dark .modal-input::placeholder {
            color: #5B4F8A;
        }
        html.dark .modal-divider {
            border-color: rgba(255, 255, 255, 0.06);
        }
        html.dark .modal-title {
            color: #EDE9FE;
        }
        html.dark .modal-tab-active {
            color: #A78BFA;
        }
        html.dark .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(167, 139, 250, 0.20);
            color: #C4B5FD;
        }

        /* Escuro Profundo (preto) */
        html.darker .modal-overlay {
            background: rgba(13, 11, 20, 0.90);
        }
        html.darker .modal-container {
            background: #1A1726;
            border: 1px solid #2A2640;
            box-shadow: 0 8px 40px rgba(13, 11, 20, 0.90);
            border-radius: 22px;
        }
        html.darker .modal-input {
            background: #15121F;
            border: 1px solid #2A2640;
            color: #E8E6F2;
        }
        html.darker .modal-input::placeholder {
            color: #4A4660;
        }
        html.darker .modal-divider {
            border-color: #2A2640;
        }
        html.darker .modal-title {
            color: #E8E6F2;
        }
        html.darker .modal-tab-active {
            color: #C4B5FD;
        }
        html.darker .modal-btn-cancel {
            background: #15121F;
            border: 1.5px solid #2A2640;
            color: #7A7690;
        }

        /* ── Escuro Profundo — Overrides globais ─────────────── */

        /* Sidebar — fundo, borda, nav text, section titles */
        html.darker aside {
            background-color: #110E1A !important;
            border-color: #2A2640 !important;
        }

        /* Sidebar section titles (COMERCIAL, FINANCEIRO, etc.) */
        html.darker aside .text-slate-500,
        html.darker aside .dark\:text-slate-500 {
            color: #4A4660 !important;
        }

        /* Sidebar nav items — default text */
        html.darker aside .text-slate-600,
        html.darker aside .dark\:text-slate-400 {
            color: #7A7690 !important;
        }

        /* Sidebar dividers */
        html.darker aside .dark\:border-white\/5,
        html.darker aside .dark\:border-white\/10,
        html.darker aside .border-white\/10 {
            border-color: #2A2640 !important;
        }

        /* Global border overrides for darker theme */
        html.darker .dark\:border-white\/5,
        html.darker .dark\:border-white\/10,
        html.darker .border-white\/5,
        html.darker .border-white\/10 {
            border-color: #2A2640 !important;
        }

        /* Secondary text color */
        html.darker .text-slate-500 {
            color: #7A7690 !important;
        }
        html.darker .text-slate-600 {
            color: #7A7690 !important;
        }

        /* Cards — closed state */
        html.darker .dark\:bg-dark-card {
            background-color: #1A1726 !important;
        }

        /* Cards — expanded/hover state */
        html.darker .dark\:bg-white\/\[0\.02\],
        html.darker .dark\:hover\:bg-white\/\[0\.02\]:hover {
            background-color: rgba(33, 30, 48, 0.5) !important;
        }

        /* Internal sections background */
        html.darker .dark\:bg-dark-input {
            background-color: #15121F !important;
        }

        /* Dropdowns & menus */
        html.darker select option {
            background-color: #1A1726 !important;
        }

        /* Progress bar backgrounds */
        html.darker .bg-white\/10,
        html.darker .dark\:bg-white\/10 {
            background-color: #2A2640 !important;
        }

        /* Scrollbar for darker theme */
        html.darker ::-webkit-scrollbar-thumb {
            background: #2A2640;
        }
        html.darker ::-webkit-scrollbar-thumb:hover {
            background: #3D3566;
        }

        /* ── Escuro Profundo — Tabelas (zebra + divisórias) ──── */

        /* Linha divisória entre rows normais */
        html.darker .dark\:border-white\/5.border-b,
        html.darker .border-b.dark\:border-white\/5,
        html.darker .border-b.border-black\/5.dark\:border-white\/5,
        html.darker .border-b.dark\:border-white\/\[0\.06\] {
            border-bottom-color: rgba(42, 38, 64, 0.2) !important;
        }

        /* Linha divisória do cabeçalho (NOME, TAGS, SQUAD…) — mais visível */
        html.darker .tracking-widest.border-b,
        html.darker .uppercase.tracking-widest.border-b {
            border-bottom-color: rgba(42, 38, 64, 0.35) !important;
        }

        /* Zebra — linhas alternadas dentro dos grupos */
        html.darker .flex.flex-col > div:nth-child(even) > .flex.items-center.gap-2.px-8.py-3.border-b {
            background-color: #110E1A !important;
        }

        /* Botões Modais (Compartilhado) */
        .modal-btn-primary {
            background: #6D28D9;
            border: none;
            color: #ffffff;
            border-radius: 10px;
            padding: 11px 0;
            font-size: 13px;
            font-weight: 600;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .modal-btn-primary:hover {
            opacity: 0.9;
        }
        .modal-btn-cancel {
            border-radius: 10px;
            padding: 11px 0;
            font-size: 13px;
            font-weight: 500;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .modal-btn-cancel:hover {
            opacity: 0.8;
        }
        
        html.dark .dark\:bg-dark-card::before, html.dark .dark\:bg-dark-input::before, html.dark .dark\:bg-dark-sidebar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom right, rgba(255, 255, 255, 0.05), transparent);
            pointer-events: none;
            border-radius: inherit;
        }
        
        html:not(.dark) body {
            background-color: #f8fafc;
            color: #1e293b;
        }

        ::selection {
            background: rgba(124, 58, 237, 0.3);
        }

        /* Remove foco/seleção nos gráficos Recharts */
        .recharts-wrapper,
        .recharts-wrapper svg,
        .recharts-surface,
        .recharts-wrapper:focus,
        .recharts-wrapper svg:focus,
        .recharts-surface:focus {
            outline: none !important;
            user-select: none;
            -webkit-user-select: none;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s duration-300;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Print Styles */
        @media print {
            body {
                background-color: white !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
            header {
                padding-bottom: 2rem !important;
                background-color: #0f172a !important;
                color: white !important;
            }
            main {
                margin-top: 0 !important;
                padding: 0 !important;
            }
            .grid {
                display: block !important;
            }
            .lg\:col-span-4, .lg\:col-span-8 {
                width: 100% !important;
                margin-bottom: 2rem;
            }
            .shadow-xl, .shadow-sm {
                box-shadow: none !important;
                border: 1px solid #e2e8f0 !important;
            }
            .bg-white, .bg-slate-900, .bg-[#1e2030] {
                background-color: white !important;
                color: black !important;
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .fixed {
                position: relative !important;
                display: none !important;
            }
            input, button {
                display: none !important;
            }
        }
        /* ─── Tiptap Visual Editor ─────────────────────────────── */
        .tiptap-wrapper .ProseMirror {
            outline: none;
            min-height: 380px;
            caret-color: #a78bfa;
            font-size: 0.875rem;
            line-height: 1.7;
            color: rgb(var(--dark-text));
        }
        /* Placeholder */
        .tiptap-wrapper .ProseMirror > p:first-child:only-child:before,
        .tiptap-wrapper .ProseMirror .is-empty::before {
            color: #64748b;
            content: attr(data-placeholder);
            float: left;
            height: 0;
            pointer-events: none;
        }
        /* Paragraphs */
        .tiptap-wrapper .ProseMirror p {
            margin-top: 0;
            margin-bottom: 0.4rem;
        }
        /* Headings */
        .tiptap-wrapper .ProseMirror h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #10B981;
            margin: 1.5rem 0 0.5rem;
        }
        .tiptap-wrapper .ProseMirror h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a78bfa;
            margin: 1.2rem 0 0.4rem;
        }
        .tiptap-wrapper .ProseMirror h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #94a3b8;
            margin: 1rem 0 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* Bullet/Ordered Lists */
        .tiptap-wrapper .ProseMirror ul:not([data-type="taskList"]) {
            padding-left: 1.4rem;
            list-style-type: disc;
            margin: 0.25rem 0 0.5rem;
        }
        .tiptap-wrapper .ProseMirror ol {
            padding-left: 1.4rem;
            list-style-type: decimal;
            margin: 0.25rem 0 0.5rem;
        }
        .tiptap-wrapper .ProseMirror li p {
            margin: 0;
        }
        /* Task List (Checklist) */
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] {
            list-style: none;
            padding: 0;
            margin: 0.25rem 0 0.5rem;
        }
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin-bottom: 0.4rem;
        }
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li > label {
            flex: 0 0 auto;
            margin-top: 0.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* Hide native checkbox */
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li > label input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        /* Custom checkbox circle */
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li > label::before {
            content: '';
            display: block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(167, 139, 250, 0.5);
            background: transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        /* Checkmark */
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li > label::after {
            content: '';
            position: absolute;
            left: 5.5px;
            top: 3px;
            width: 5px;
            height: 9px;
            border-right: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(45deg) scale(0);
            transition: transform 0.15s ease;
        }
        /* Hover state */
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li > label:hover::before {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.1);
        }
        /* Checked state */
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li[data-checked="true"] > label::before {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li[data-checked="true"] > label::after {
            transform: rotate(45deg) scale(1);
        }
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li > div {
            flex: 1;
        }
        .tiptap-wrapper .ProseMirror ul[data-type="taskList"] > li[data-checked="true"] > div {
            text-decoration: line-through;
            opacity: 0.5;
        }
        /* ── Toggle / Lista Alternada (Tiptap Details Extension v3) ──────────────── */
        /* The extension renders: div[data-type="details"] > div[data-type="detailsSummary"] > summary */
        .tiptap-wrapper .ProseMirror div[data-type="details"] {
            margin: 0.3rem 0;
        }
        .tiptap-wrapper .ProseMirror div[data-type="detailsSummary"] {
            display: flex;
            align-items: baseline;
            gap: 0;
            padding: 0;
        }
        .tiptap-wrapper .ProseMirror div[data-type="detailsSummary"] summary {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            padding: 0.2rem 0;
            cursor: pointer;
            list-style: none;
            font-size: 0.875rem;
            color: rgb(var(--dark-text));
            user-select: none;
            font-weight: 500;
            width: 100%;
        }
        .tiptap-wrapper .ProseMirror div[data-type="detailsSummary"] summary::-webkit-details-marker { display: none; }
        .tiptap-wrapper .ProseMirror div[data-type="detailsSummary"] summary::marker { display: none; content: ''; }
        /* Arrow */
        .tiptap-wrapper .ProseMirror div[data-type="detailsSummary"] summary::before {
            content: '▶';
            font-size: 8px;
            color: #a78bfa;
            transition: transform 0.18s ease;
            display: inline-block;
            width: 14px;
            flex-shrink: 0;
            margin-top: 2px;
            margin-right: 4px;
        }
        /* Open state — arrow rotated */
        .tiptap-wrapper .ProseMirror div[data-type="details"].is-open div[data-type="detailsSummary"] summary::before,
        .tiptap-wrapper .ProseMirror div[data-type="details"][open] div[data-type="detailsSummary"] summary::before {
            transform: rotate(90deg);
        }
        /* Content area hidden by default, visible when open */
        .tiptap-wrapper .ProseMirror div[data-type="detailsContent"] {
            padding-left: 1.6rem;
            margin: 0.1rem 0 0.25rem;
        }
        /* Horizontal Rule */
        .tiptap-wrapper .ProseMirror hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 1rem 0;
        }
        /* Strong / Bold */
        .tiptap-wrapper .ProseMirror strong {
            font-weight: 700;
            color: rgb(var(--dark-text));
        }
        /* Light mode overrides */
        html.light .tiptap-wrapper .ProseMirror {
            color: #1e293b;
        }
        html.light .tiptap-wrapper .ProseMirror h1 { color: #059669; }
        html.light .tiptap-wrapper .ProseMirror h2 { color: #7c3aed; }
        html.light .tiptap-wrapper .ProseMirror h3 { color: #475569; }
        html.light .tiptap-wrapper .ProseMirror hr { border-color: rgba(0,0,0,0.1); }
    </style>
    <script>
        window.onerror = function(msg) {
            const root = document.getElementById('root');
            if (root && root.innerHTML === "") {
                root.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif; background: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: center;"><h1>Erro ao carregar</h1><p style="color: #64748b;">' + msg + '</p><p style="font-size: 12px; margin-top: 10px;">Verifique se as variáveis de ambiente VITE_FIREBASE_* estão configuradas na Hostinger.</p></div>';
            }
        };
    </script>
