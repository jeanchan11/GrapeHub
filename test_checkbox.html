<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; padding: 50px; }
        .box {
            position: relative;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #8b5cf6;
        }
        .box::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 2px;
            width: 5px;
            height: 8px;
            border-right: 2.5px solid white;
            border-bottom: 2.5px solid white;
            transform: rotate(45deg);
        }
        .box2 {
            position: relative;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #8b5cf6;
            margin-top: 20px;
        }
        .box2::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border-right: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2"></div>
</body>
</html>
